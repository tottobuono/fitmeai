# Ambiente di sviluppo locale per Fitme.ai.
#
# Avvia SOLO l'infrastruttura di base: PostgreSQL, Redis e MinIO (storage S3-compatibile,
# usato come stand-in locale del bucket EU). I servizi applicativi (apps/api, workers/tryon,
# apps/web) verranno aggiunti qui quando avranno il proprio Dockerfile (Task 5/6/7).
#
# Uso:
#   cp .env.example .env   # poi adatta i valori se necessario
#   docker compose up -d
#
# Le variabili sono lette da .env (vedi .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitme-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO: storage S3-compatibile per uso locale (foto, output, avatar).
  # In produzione viene sostituito da un bucket S3-compatibile in regione EU.
  minio:
    image: minio/minio:latest
    container_name: fitme-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
      MINIO_REGION: ${STORAGE_REGION}
    ports:
      - "${STORAGE_PORT}:9000"        # API S3
      - "${STORAGE_CONSOLE_PORT}:9001" # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Job one-shot: crea il bucket all'avvio se non esiste, poi termina.
  minio-init:
    image: minio/mc:latest
    container_name: fitme-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET} &&
      echo 'Bucket ${STORAGE_BUCKET} pronto.';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
